<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Viewer de Juegos</title>
  <style>
    :root{
      --bg:#f4f5f7;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --line:#e5e7eb;
      --accent:#d946ef;
      --accent-soft:#fdf2ff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .app{
      max-width:560px;
      margin:0 auto;
      min-height:100vh;
    }
    .header{
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(255,255,255,.96);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
      padding:16px;
    }
    h1{
      margin:0;
      font-size:24px;
      line-height:1.1;
    }
    .sub{
      margin-top:6px;
      color:var(--muted);
      font-size:14px;
    }
    .controls{
      margin-top:14px;
      display:grid;
      gap:10px;
    }
    input,select{
      width:100%;
      border:1px solid #d1d5db;
      background:#fff;
      border-radius:16px;
      padding:14px 16px;
      font-size:15px;
      outline:none;
    }
    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }
    .content{padding:16px 16px 28px}
    .summary{
      background:var(--card);
      border-radius:18px;
      padding:14px 16px;
      box-shadow:0 1px 4px rgba(0,0,0,.05);
      margin-bottom:16px;
    }
    .summary .label{font-size:13px;color:var(--muted)}
    .summary .value{font-size:30px;font-weight:800;margin-top:2px}
    .day-title{
      font-size:20px;
      font-weight:800;
      margin:20px 2px 10px;
    }
    .list{display:grid;gap:12px}
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:24px;
      padding:16px;
      box-shadow:0 2px 8px rgba(0,0,0,.04);
    }
    .top{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
    }
    .chip{
      background:#f3f4f6;
      border-radius:999px;
      padding:7px 12px;
      font-size:12px;
      white-space:nowrap;
      font-weight:700;
    }
    .division{
      color:var(--accent);
      font-size:12px;
      font-weight:900;
      letter-spacing:.05em;
      text-transform:uppercase;
    }
    .time{
      font-size:28px;
      font-weight:900;
      margin-top:3px;
    }
    .teambox{
      margin-top:14px;
      display:grid;
      gap:8px;
    }
    .team{
      background:#f9fafb;
      border-radius:16px;
      padding:12px;
    }
    .team .label{
      font-size:11px;
      color:var(--muted);
      margin-bottom:4px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .team .name{
      font-size:16px;
      font-weight:700;
      line-height:1.25;
    }
    .vs{
      text-align:center;
      color:#9ca3af;
      font-size:11px;
      font-weight:900;
      letter-spacing:.15em;
      text-transform:uppercase;
    }
    .meta{
      margin-top:12px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .meta-box{
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
    }
    .meta-box .label{
      font-size:11px;
      color:var(--muted);
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .meta-box .value{
      margin-top:4px;
      font-size:15px;
      font-weight:700;
      line-height:1.2;
    }
    .bracket{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
    }
    .bracket b{color:var(--text)}
    .empty{
      padding:24px;
      text-align:center;
      color:var(--muted);
      background:var(--card);
      border-radius:18px;
      border:1px solid var(--line);
    }
    .footer-note{
      margin-top:18px;
      color:var(--muted);
      font-size:12px;
      text-align:center;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Viewer de Juegos</h1>
      <div class="sub">Versión móvil para leer el calendario mucho mejor</div>

      <div class="controls">
        <input id="search" placeholder="Buscar equipo, lugar, hora o división" />
        <div class="grid2">
          <select id="dayFilter"></select>
          <select id="divisionFilter"></select>
        </div>
      </div>
    </div>

    <div class="content">
      <div class="summary">
        <div class="label">Juegos encontrados</div>
        <div class="value" id="count">0</div>
      </div>

      <div id="results"></div>
      <div class="footer-note">Cada vez que me envíes una tabla nueva, te actualizo este viewer.</div>
    </div>
  </div>

<script>
const games = [
  { id: 1, bracket: 'U10', game: 1, field: 'Roja', time: '8:00am', team1: 'Surf Guaynabo U10 F 2017-2018 Blue', team2: 'Caribbean Stars Caguas U10 F Cat 2026', division: 'U10 FEM', location: 'Tasa', day: 'Sábado 14' },
  { id: 2, bracket: 'U10', game: 2, field: 'Roja', time: '8:00am', team1: 'Dorado Surf U10 F Blue', team2: 'Metropolitan U10 F', division: 'U10 FEM', location: 'Torrimar', day: 'Sábado 14' },
  { id: 3, bracket: 'U10', game: 3, field: 'Azul', time: '8:00am', team1: 'Catala FC U10 F', team2: 'Mirabelli U10 F', division: 'U10 FEM', location: 'Torrimar', day: 'Sábado 14' },
  { id: 4, bracket: 'U10', game: 4, field: 'Roja', time: '10:30am', team1: 'Dorado Surf U10 F Blue', team2: 'Mirabelli U10 F', division: 'U10 FEM', location: 'Torrimar', day: 'Sábado 14' },
  { id: 5, bracket: 'U10', game: 5, field: 'Azul', time: '10:30am', team1: 'Metropolitan U10 F', team2: 'Fraigcomar U10 F', division: 'U10 FEM', location: 'Torrimar', day: 'Sábado 14' },
  { id: 6, bracket: 'U10', game: 6, field: 'Roja', time: '1:30pm', team1: 'Gladiadores U10 F', team2: 'Fraigcomar U10 F', division: 'U10 FEM', location: 'Torrimar', day: 'Sábado 14' },

  { id: 7, bracket: 'U12', game: 7, field: 'Roja', time: '9:15am', team1: 'Surf Guaynabo U12 F 2014-2015 White', team2: 'Caribbean Stars Caguas U12 F Categoría 2026', division: 'U12 FEM', location: 'Tasa', day: 'Sábado 14' },
  { id: 8, bracket: 'U12', game: 8, field: 'Roja', time: '2:45pm', team1: 'Mirabelli U12 F', team2: 'Taurinos de Cayey U12 F', division: 'U12 FEM', location: 'Torrimar', day: 'Sábado 14' },
  { id: 9, bracket: 'U12', game: 9, field: 'Azul', time: '2:45pm', team1: 'Surf Guaynabo U12 F 2014-2015 Blue', team2: 'Dorado Surf U12 F Blue', division: 'U12 FEM', location: 'Torrimar', day: 'Sábado 14' },
  { id: 10, bracket: 'U12', game: 10, field: 'Roja', time: '5:15pm', team1: 'Catala FC U12 F', team2: 'Club Tornados U12 F', division: 'U12 FEM', location: 'Torrimar', day: 'Sábado 14' },
  { id: 11, bracket: 'U12', game: 11, field: 'Azul', time: '5:15pm', team1: 'Dorado Surf U12 F Blue', team2: 'Taurinos de Cayey U12 F', division: 'U12 FEM', location: 'Torrimar', day: 'Sábado 14' },

  { id: 12, bracket: 'U14', game: 12, field: 'Cancha 2', time: '9:30am', team1: 'Mirabelli U14 F', team2: 'Caribbean Stars Caguas U14 F Categoría 2026', division: 'U14 FEM', location: 'BS Complex 1', day: 'Domingo 15' },
  { id: 13, bracket: 'U14', game: 13, field: 'Cancha 2', time: '10:55am', team1: 'Metropolitan U14 F', team2: 'Surf Guaynabo U14 F 2013-2014 Blue', division: 'U14 FEM', location: 'BS Complex 1', day: 'Domingo 15' },

  { id: 14, bracket: 'U16', game: 14, field: 'Cancha completa', time: '8:00am', team1: 'Taurinos de Cayey U16 F', team2: 'Mirabelli U16 F', division: 'U16 FEM', location: 'Caribbean Stars', day: 'Sábado 14' },
  { id: 15, bracket: 'U16', game: 15, field: 'Cancha completa', time: '10:00am', team1: 'Fraigcomar U16 F', team2: 'Ivy League SC U16 F', division: 'U16 FEM', location: 'Caribbean Stars', day: 'Sábado 14' },
  { id: 16, bracket: 'U16', game: 16, field: 'Cancha completa', time: '1:45pm', team1: 'Gladiadores U16 F', team2: 'Bayamon FC U16 F', division: 'U16 FEM', location: 'Caribbean Stars', day: 'Sábado 14' },
  { id: 17, bracket: 'U16', game: 17, field: 'Cancha completa', time: '3:45pm', team1: 'Ivy League SC U16 F', team2: 'Taurinos de Cayey U16 F', division: 'U16 FEM', location: 'Caribbean Stars', day: 'Sábado 14' },
  { id: 18, bracket: 'U16', game: 18, field: 'Cancha completa', time: '5:45pm', team1: 'Caribe SC U16 F', team2: 'Caribbean Stars Caguas U16 F Categoría 2026', division: 'U16 FEM', location: 'Caribbean Stars', day: 'Sábado 14' },

  { id: 19, bracket: 'U17+', game: 19, field: 'Cancha 3', time: '8:00am', team1: 'Surf Guaynabo U17 F Blue', team2: 'Fraigcomar U17 F Gold', division: 'U17+ FEM DIV 1', location: 'BS Complex 1', day: 'Sábado 14' },
  { id: 20, bracket: 'U17+', game: 20, field: 'Cancha 3', time: '10:00am', team1: 'Caribbean Stars Caguas U17 F', team2: 'Coamo FC U17 F', division: 'U17+ FEM DIV 1', location: 'BS Complex 1', day: 'Sábado 14' },
  { id: 21, bracket: 'U17+', game: 21, field: 'Cancha 3', time: '2:00pm', team1: 'Fraigcomar U17 F Division II Silver', team2: 'Bayamon FC U17 F', division: 'U17+ FEM DIV 2', location: 'BS Complex 1', day: 'Sábado 14' },
  { id: 22, bracket: 'U17+', game: 22, field: 'Cancha 3', time: '4:00pm', team1: 'Mirabelli U17 F', team2: 'Metropolitan U17 F', division: 'U17+ FEM DIV 2', location: 'BS Complex 1', day: 'Sábado 14' },
];

const searchInput = document.getElementById('search');
const dayFilter = document.getElementById('dayFilter');
const divisionFilter = document.getElementById('divisionFilter');
const countEl = document.getElementById('count');
const resultsEl = document.getElementById('results');

function unique(arr){ return [...new Set(arr)]; }

function fillFilters(){
  const days = ['Todos', ...unique(games.map(g => g.day))];
  const divisions = ['Todas', ...unique(games.map(g => g.division))];

  dayFilter.innerHTML = days.map(d => `<option value="${d}">${d}</option>`).join('');
  divisionFilter.innerHTML = divisions.map(d => `<option value="${d}">${d}</option>`).join('');
}

function card(game){
  return `
    <div class="card">
      <div class="top">
        <div>
          <div class="division">${game.division}</div>
          <div class="time">${game.time}</div>
        </div>
        <div class="chip">Juego ${game.game}</div>
      </div>

      <div class="teambox">
        <div class="team">
          <div class="label">Equipo 1</div>
          <div class="name">${game.team1}</div>
        </div>
        <div class="vs">VS</div>
        <div class="team">
          <div class="label">Equipo 2</div>
          <div class="name">${game.team2}</div>
        </div>
      </div>

      <div class="meta">
        <div class="meta-box">
          <div class="label">Cancha</div>
          <div class="value">${game.field}</div>
        </div>
        <div class="meta-box">
          <div class="label">Lugar</div>
          <div class="value">${game.location}</div>
        </div>
      </div>

      <div class="bracket">Grupo: <b>${game.bracket}</b></div>
    </div>
  `;
}

function render(){
  const q = searchInput.value.trim().toLowerCase();
  const day = dayFilter.value;
  const division = divisionFilter.value;

  const filtered = games.filter(g => {
    const haystack = [g.team1, g.team2, g.location, g.field, g.bracket, g.division, g.time, g.day].join(' ').toLowerCase();
    return (!q || haystack.includes(q))
      && (day === 'Todos' || g.day === day)
      && (division === 'Todas' || g.division === division);
  });

  countEl.textContent = filtered.length;

  if (!filtered.length) {
    resultsEl.innerHTML = `<div class="empty">No encontré juegos con ese filtro.</div>`;
    return;
  }

  const grouped = {};
  filtered.forEach(g => {
    if (!grouped[g.day]) grouped[g.day] = [];
    grouped[g.day].push(g);
  });

  resultsEl.innerHTML = Object.entries(grouped).map(([day, items]) => `
    <div>
      <div class="day-title">${day}</div>
      <div class="list">
        ${items.map(card).join('')}
      </div>
    </div>
  `).join('');
}

fillFilters();
render();

searchInput.addEventListener('input', render);
dayFilter.addEventListener('change', render);
divisionFilter.addEventListener('change', render);
</script>
</body>
</html>
